version: 1.2.1
cache: true

interface:
  modelSelect: true
  parameters: true
  presets: true
  privacyPolicy:
    externalUrl: ''
  termsOfService:
    externalUrl: ''

modelSpecs:
  addedEndpoints:
    - anthropic
    - openAI
  list:
    - name: claude-sonnet-4-6-default
      label: Claude Sonnet 4.6
      description: Default Claude model for new chats.
      default: true
      preset:
        endpoint: anthropic
        model: claude-sonnet-4-6

mcpSettings:
  allowedDomains:
    - kb-mcp
    - http://kb-mcp:7878
    - localhost

mcpServers:
  knowledgebase:
    type: sse
    url: http://kb-mcp:7878/sse
    timeout: 30000

# Model names and provider keys are configured through docker-compose.yml:
#   ANTHROPIC_API_KEY, ANTHROPIC_MODELS
#   OPENAI_API_KEY, OPENAI_MODELS
