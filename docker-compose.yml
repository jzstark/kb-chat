services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    command: ["--wiredTigerCacheSizeGB", "0.5"]
    volumes:
      - ./data/mongo:/data/db

  meilisearch:
    image: getmeili/meilisearch:v1.7
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - ./data/meili:/meili_data

  kb-mcp:
    image: ghcr.io/${GITHUB_OWNER:-owner}/kb-chat-kb-mcp:latest
    build:
      context: ./services/kb-mcp
    restart: unless-stopped
    environment:
      KB_API_BASE: ${KB_API_BASE:-https://swanny.laughtale.co.uk}
      KB_SERVICE_TOKEN: ${KB_SERVICE_TOKEN:-}
      PORT: 7878
    expose:
      - "7878"

  search-mcp:
    image: ghcr.io/${GITHUB_OWNER:-owner}/kb-chat-search-mcp:latest
    build:
      context: ./services/search-mcp
    restart: unless-stopped
    environment:
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      PORT: 7879
    expose:
      - "7879"

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      HOST: 0.0.0.0
      PORT: 3080
      MONGO_URI: mongodb://mongodb:27017/LibreChat
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      JWT_SECRET: ${LIBRECHAT_JWT_SECRET}
      JWT_REFRESH_SECRET: ${LIBRECHAT_JWT_REFRESH_SECRET}
      CREDS_KEY: ${LIBRECHAT_CREDS_KEY}
      CREDS_IV: ${LIBRECHAT_CREDS_IV}
      DOMAIN_CLIENT: ${LIBRECHAT_DOMAIN_CLIENT:-https://chat.laughtale.co.uk}
      DOMAIN_SERVER: ${LIBRECHAT_DOMAIN_SERVER:-https://chat.laughtale.co.uk}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      ALLOW_EMAIL_LOGIN: "true"
      ALLOW_SOCIAL_LOGIN: "false"
      ANTHROPIC_API_KEY: ${CLAUDE_API_KEY}
      ANTHROPIC_MODELS: claude-opus-4-7,claude-sonnet-4-6,claude-haiku-4-5-20251001
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODELS: gpt-4o,gpt-4o-mini
    volumes:
      - ./config/librechat.yaml:/app/librechat.yaml:ro
      - ./data/librechat/images:/app/client/public/images
      - ./data/librechat/logs:/app/api/logs
    depends_on:
      - mongodb
      - meilisearch
      - kb-mcp
      - search-mcp

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - librechat

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_API_VERSION: "1.41"
    command: --interval 3600
