name: Build Docker images

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push kb-mcp
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/kb-chat-kb-mcp:latest ./services/kb-mcp
          docker push ghcr.io/${{ github.repository_owner }}/kb-chat-kb-mcp:latest

      - name: Build and push search-mcp
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/kb-chat-search-mcp:latest ./services/search-mcp
          docker push ghcr.io/${{ github.repository_owner }}/kb-chat-search-mcp:latest
