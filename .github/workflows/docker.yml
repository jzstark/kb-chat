name: Build Docker images

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  kb-mcp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push kb-mcp
        uses: docker/build-push-action@v6
        with:
          context: ./services/kb-mcp
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kb-chat-kb-mcp:latest

  search-mcp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push search-mcp
        uses: docker/build-push-action@v6
        with:
          context: ./services/search-mcp
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kb-chat-search-mcp:latest
